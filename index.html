<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projeto Ascensão</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:20px;
}

.card{
background:#151c2c;
padding:20px;
border-radius:20px;
max-width:500px;
margin:auto;
box-shadow:0 0 20px rgba(0,255,255,.15);
}

h1{
text-align:center;
color:#00e5ff;
}

.rank{
text-align:center;
font-size:20px;
margin-bottom:20px;
}

.xp{
width:100%;
height:22px;
background:#222;
border-radius:20px;
overflow:hidden;
}

.barra{
height:100%;
width:20%;
background:#00ff88;
}

.info{
margin-top:20px;
line-height:1.8;
}

.missao{
margin-top:20px;
padding:15px;
background:#20293d;
border-radius:15px;
}

button{
width:100%;
margin-top:20px;
padding:15px;
font-size:18px;
background:#00e5ff;
border:none;
border-radius:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h1>🛡️ PROJETO ASCENSÃO</h1>

<div class="rank">
Nível 1 • Rank E
</div>

<div class="xp">
<div class="barra"></div>
</div>

<div class="info">

<p>⭐ XP: 20 / 100</p>

<p>💻 Classe: Aprendiz</p>

<p>🧠 Inteligência: 1</p>

<p>⚡ Disciplina: 1</p>

<p>🎨 Criatividade: 1</p>

</div>

<div class="missao">

<h2>Missão Atual</h2>

<p>Criar a primeira versão do Projeto Ascensão.</p>

</div>

<button>Iniciar Jornada</button>

</div>

</body>

</html>
